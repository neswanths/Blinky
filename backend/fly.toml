# Fly.io deployment config for Blinky backend
app = "blinky-api"
primary_region = "sin"  # Singapore — closest to India

[build]
  # Fly will detect it as a Python app automatically

[env]
  PORT = "8000"
  PYTHONUNBUFFERED = "1"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false  # KEY: never sleep!
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
